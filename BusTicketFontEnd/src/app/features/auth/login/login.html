    <div class="auth-page">
      <div class="container py-5">
        <div class="row justify-content-center min-vh-100 align-items-center">
          <div class="col-12 col-md-6 col-lg-5 col-xl-4">

            <div class="text-center mb-4 fade-up">
              <a routerLink="/" class="text-decoration-none">
                <div class="auth-brand-icon">
                  <i class="bi bi-bus-front-fill"></i>
                </div>
                <div style="font-weight:800;font-size:1.4rem;color:#0f172a">
                  Swift<span class="text-primary">Bus</span>
                </div>
              </a>
            </div>

            <div class="auth-card fade-up">

              <div class="text-center mb-4">
                <h3 class="fw-bold mb-1">Welcome back</h3>
                <p class="text-muted small mb-0">Sign in to your account</p>
              </div>

              @if (error()) {
                <div class="alert alert-danger d-flex align-items-center gap-2" role="alert">
                  <i class="bi bi-exclamation-circle-fill"></i>
                  <div>{{ error() }}</div>
                </div>
              }

              <form (ngSubmit)="submit()" #loginForm="ngForm" novalidate>

                <div class="mb-3">
                  <label for="email" class="form-label">Email</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input id="email" type="text" class="form-control"
                           placeholder="Your email"
                           [(ngModel)]="form.email" name="email" required
                           #un="ngModel"
                           [class.is-invalid]="un.invalid && un.touched" />
                    <div class="invalid-feedback">Email is required</div>
                  </div>
                </div>

                <div class="mb-4">
                  <label for="password" class="form-label">Password</label>
                  <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input id="password" [type]="showPass() ? 'text' : 'password'"
                           class="form-control" placeholder="Your password"
                           [(ngModel)]="form.password" name="password" required
                           #pw="ngModel"
                           [class.is-invalid]="pw.invalid && pw.touched" />
                    <button type="button" class="btn btn-outline-secondary border-start-0"
                            style="border-radius:0 10px 10px 0 !important"
                            (click)="showPass.set(!showPass())">
                      <i class="bi" [class.bi-eye]="!showPass()" [class.bi-eye-slash]="showPass()"></i>
                    </button>
                    <div class="invalid-feedback">Password is required</div>
                  </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg"
                        [disabled]="loading() || loginForm.invalid">
                  @if (loading()) {
                    <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
                  } @else {
                    <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                  }
                </button>

              </form>

              <hr class="my-4">

              <div class="text-center">
                <p class="text-muted small mb-3">Don't have an account?</p>
                <a routerLink="/register" class="btn btn-outline-primary w-100">
                  <i class="bi bi-person-plus me-2"></i>Create Account
                </a>
              </div>

              <div class="mt-4 p-3 rounded-3 bg-light border">
                <p class="mb-1 text-muted" style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em">
                  Demo Login
                </p>
                <p class="mb-0 small"><strong>Admin:</strong> admin@busticket.com / Admin&#64;1234</p>
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>
